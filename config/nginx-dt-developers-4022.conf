# DÉSACTIVÉ — Ne pas activer en production.
# L’exposition publique se fait via Apache :443 (config/apache-developers.dt-money.com.conf).
#
# dt-developers – Nginx : HTTPS sur le port 4022 → Next.js sur 4023 (legacy)
#
# À installer sur le VPS :
#   sudo cp config/nginx-dt-developers-4022.conf /etc/nginx/sites-available/dt-developers-4022
#   sudo ln -sf /etc/nginx/sites-available/dt-developers-4022 /etc/nginx/sites-enabled/dt-developers-4022
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo ufw allow 4022/tcp && sudo ufw reload
#
# Certificat dédié (après DNS developers.dt-money.com → ce VPS) :
#   sudo certbot certonly --webroot -w /var/www/html -d developers.dt-money.com
# Puis mettre à jour ssl_certificate ci-dessous et recharger nginx.

server {
    listen 4022 ssl;
    server_name developers.dt-money.com vps101055.serveur-vps.net;

    ssl_certificate     /etc/letsencrypt/live/developers.dt-money.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/developers.dt-money.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:4023;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
