# developers.dt-money.com — HTTP (ACME + redirect) et HTTPS (443 → Next.js 4023)

<VirtualHost *:80>
    ServerName developers.dt-money.com

    Alias /.well-known/acme-challenge/ /var/www/letsencrypt/.well-known/acme-challenge/
    <Directory /var/www/letsencrypt/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://developers.dt-money.com%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/developers.dt-money.com-error.log
    CustomLog ${APACHE_LOG_DIR}/developers.dt-money.com-access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName developers.dt-money.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/developers.dt-money.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/developers.dt-money.com/privkey.pem

    SSLUseStapling off

    Header always set Strict-Transport-Security "max-age=31536000"

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass / http://127.0.0.1:4023/
    ProxyPassReverse / http://127.0.0.1:4023/

    ErrorLog ${APACHE_LOG_DIR}/developers.dt-money.com-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/developers.dt-money.com-ssl-access.log combined
</VirtualHost>
</IfModule>
